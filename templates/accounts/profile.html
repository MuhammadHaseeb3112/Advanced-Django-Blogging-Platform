{% extends 'base.html' %}

{% block content %}

<h2>Profile</h2>

{% if request.user.profile_image %}
    <img
        src="{{ request.user.profile_image.url }}"
        width="150"
    >
{% endif %}

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Update Profile
    </button>

</form>

{% endblock %}
