{% extends 'base.html' %}

{% block content %}

<div class="admin-layout">

    <!-- SIDEBAR -->

    {% include 'includes/dashboard_sidebar.html' %}

    <!-- MAIN CONTENT -->

    <main class="dashboard-main">

        <div class="form-wrapper">

            <div class="form-card">

                <!-- TOP -->

                <div class="form-top">

                    <span class="form-badge">

                        ✏️ Edit Blog

                    </span>

                    <h1>

                        Update Your Article

                    </h1>

                    <p>

                        Edit and improve your blog content.

                    </p>

                </div>

                <!-- FORM -->

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- TITLE -->

                    <div class="form-group">

                        <label>

                            Blog Title

                        </label>

                        <input type="text" name="title" value="{{ post.title }}" required>

                    </div>

                    <!-- SHORT DESCRIPTION -->

                    <div class="form-group">

                        <label>

                            Short Description

                        </label>

                        <textarea name="short_description" rows="4">{{ post.short_description }}</textarea>

                    </div>

                    <!-- CONTENT -->

                    <div class="form-group">

                        <label>

                            Blog Content

                        </label>

                        <textarea name="content" rows="12">{{ post.content }}</textarea>

                    </div>

                    <!-- STATUS -->

                    <div class="form-group">

                        <label>

                            Status

                        </label>

                        <select name="status">

                            <!-- DRAFT -->

                            <option value="draft" {% if post.status == 'draft' %} selected {% endif %}>

                                Draft

                            </option>

                            <!-- PUBLISHED -->

                            <option value="published" {% if post.status == 'published' %} selected {% endif %}>

                                Published

                            </option>

                        </select>

                    </div>

                    <!-- CATEGORY -->

                    <div class="form-group">

                        <label>

                            Category

                        </label>

                        <select name="category">

                            <option value="">

                                Select Category

                            </option>

                            {% for category in categories %}

                            <option value="{{ category.id }}" {% if post.category.id == category.id %} selected {% endif %}>

                                {{ category.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- TAGS -->

                    <div class="form-group">

                        <label>

                            Tags

                        </label>

                        <select name="tags" multiple class="multi-select">

                            {% for tag in tags %}

                            <option value="{{ tag.id }}" {% if tag in post.tags.all %} selected {% endif %}>

                                {{ tag.name }}

                            </option>

                            {% endfor %}

                        </select>

                        <small class="helper-text">

                            Hold CTRL to select multiple tags

                        </small>

                    </div>

                    <!-- FEATURED IMAGE -->

                    <div class="form-group">

                        <label>

                            Featured Image

                        </label>

                        <input type="file" name="featured_image">

                    </div>

                    <!-- CURRENT IMAGE -->

                    {% if post.featured_image %}

                    <div class="current-image">

                        <p>

                            Current Image

                        </p>

                        <img src="{{ post.featured_image.url }}" alt="{{ post.title }}">

                    </div>

                    {% endif %}

                    <!-- BUTTON -->

                    <button class="submit-btn">

                        Update Blog

                    </button>

                </form>

            </div>

        </div>

    </main>

</div>

<style>

.multi-select {

min-height: 180px;

}

.helper-text {

display: block;

margin-top: 10px;

color: #6b7280;

font-size: 14px;

}



    .form-wrapper {

        display: flex;

        justify-content: center;

    }

    .form-card {

        width: 100%;

        max-width: 950px;

        background: white;

        padding: 50px;

        border-radius: 30px;

        box-shadow:
            0 10px 30px rgba(0, 0, 0, 0.05);

    }

    .form-top {

        margin-bottom: 40px;

    }

    .form-badge {

        background: #dbeafe;

        color: #2563eb;

        padding: 10px 18px;

        border-radius: 50px;

        font-weight: 600;

    }

    .form-top h1 {

        font-size: 52px;

        margin-top: 20px;

        margin-bottom: 16px;

    }

    .form-top p {

        color: #6b7280;

    }

    .form-group {

        display: flex;

        flex-direction: column;

        gap: 12px;

        margin-bottom: 28px;

    }

    .form-group label {

        font-weight: 600;

    }

    .form-group input,
    .form-group textarea,
    .form-group select {

        width: 100%;

        padding: 16px 20px;

        border-radius: 16px;

        border: 1px solid #e5e7eb;

        background: #f9fafb;

        font-size: 16px;

        outline: none;

    }

    .form-group textarea {

        resize: vertical;

    }

    .current-image {

        margin-bottom: 30px;

    }

    .current-image p {

        margin-bottom: 12px;

        font-weight: 600;

    }

    .current-image img {

        width: 100%;

        max-width: 300px;

        border-radius: 20px;

    }

    .submit-btn {

        width: 100%;

        background: #2563eb;

        color: white;

        border: none;

        padding: 18px;

        border-radius: 16px;

        font-size: 16px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;

    }

    .submit-btn:hover {

        background: #1d4ed8;

    }

    @media(max-width: 768px) {

        .form-card {

            padding: 30px;

        }

        .form-top h1 {

            font-size: 38px;

        }

    }
</style>

{% endblock %}
