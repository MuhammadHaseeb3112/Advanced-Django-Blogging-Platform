services:

  # =========================================
  # DJANGO WEB APPLICATION
  # =========================================

  web:
    build: .

    container_name: django_web

    command: >
      sh -c " python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 core.asgi:application "

    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.development

    volumes:
      - .:/app

    expose:
      - "8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    restart: always

  # =========================================
  # CELERY WORKER
  # =========================================

  celery:
    build: .

    container_name: celery_worker

    command: celery -A core worker -l info

    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.development

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis

    restart: always

  # =========================================
  # CELERY BEAT
  # =========================================

  celery-beat:
    build: .

    container_name: celery_beat

    command: celery -A core beat -l info

    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.development

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis

    restart: always

  # =========================================
  # FLOWER
  # =========================================

  flower:
    build: .

    container_name: flower_server

    command: celery -A core flower --port=5555

    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.development

    volumes:
      - .:/app

    env_file:
      - .env

    ports:
      - "5555:5555"

    depends_on:
      - redis
      - celery

    restart: always

  # =========================================
  # REDIS
  # =========================================

  redis:
    image: redis:7

    container_name: redis_server

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: always

  # =========================================
  # NGINX
  # =========================================

  nginx:
    image: nginx:latest

    container_name: nginx_server

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

    depends_on:
      - web

    restart: always

  # =========================================
  # POSTGRESQL DATABASE
  # =========================================

  db:
    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

# =========================================
# VOLUMES
# =========================================

volumes:

  postgres_data:

  redis_data:
